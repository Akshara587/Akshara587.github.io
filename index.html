<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SLEEP DEPRIVATION & OVERTHINKING</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 18px;
    line-height: 1.7;
    color: #f0f0f0;
    overflow: hidden;
    background: #050505;
}

/* STARS */
.stars {
    position: fixed;
    width: 200%;
    height: 200%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: starMove 120s linear infinite;
    opacity: 0.4;
    z-index: -1;
}

@keyframes starMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-500px, -500px); }
}

/* BACKGROUNDS */
.homePage {
    background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.5)),
    url("https://i.pinimg.com/originals/aa/7b/95/aa7b950c42d531b92d99b792cfbe12af.gif");
    background-size: cover; background-position: center;
}

.normalPage {
    background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
    url("https://i.pinimg.com/736x/14/cf/e9/14cfe9109c3c3b46d59686696518639b.jpg");
    background-size: cover; background-position: center;
}

/* NAV */
nav {
    position: fixed; top: 0; width: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    padding: 15px 0; text-align: center; z-index: 100;
}

nav button {
    padding: 12px 24px; margin: 0 6px;
    border-radius: 25px; border: 1px solid rgba(255,0,0,0.4);
    color: #f0f0f0;
    background: rgba(30,0,0,0.7);
    cursor: pointer;
}

nav button.active {
    background: #ff0000;
}

/* PAGES */
.container {
    display: flex; width: 800vw; height: 100vh;
    transition: transform 1s;
}

.page {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px 40px;
}

.page.inactive { opacity: 0.1; }

h1 { color: #ff4d4d; font-size: 50px; }
h2 { color: #fff; }

/* TIPS */
.tipsContainer {
    text-align: left;
    background: rgba(20,20,20,0.95);
    padding: 40px;
    border-radius: 25px;
    max-width: 600px;
}

/* SHEEP */
.sheepGif {
    width: 300px;
    border-radius: 20px;
    margin-bottom: 20px;
}

.sheepCounter {
    font-size: 50px;
    color: #ff4d4d;
}
</style>
</head>

<body>

<div class="stars"></div>

<nav>
<button onclick="go(0)">Home</button>
<button onclick="go(1)">About</button>
<button onclick="go(2)">Insomnia</button>
<button onclick="go(3)">Effects</button>
<button onclick="go(4)">Sleep Tips</button>
<button onclick="go(5)">Breathing</button>
<button onclick="go(6)">Counting</button>
<button onclick="go(7)">Simulator</button>
</nav>

<div class="container" id="container">

<div class="page homePage">
<h1>SLEEP DEPRIVATION & OVERTHINKING</h1>
<h2>The Night That Never Ends</h2>
</div>

<div class="page normalPage">
<h2>Sleep Tips</h2>
<div class="tipsContainer">
<p>🌙 Keep room dark</p>
<p>📵 No screens before bed</p>
<p>📓 Write your thoughts</p>
</div>
</div>

<!-- ✅ FIXED SHEEP SECTION -->
<div class="page normalPage">
<h2>Count the Sheep</h2>

<img class="sheepGif" src="sheep.gif" alt="Sheep gif">

<div class="sheepCounter" id="sheepVal">0</div>

<button onclick="countSheep()">Click to Count</button>

</div>

</div>

<script>
let sheepCount = 0;

function go(index){
document.getElementById("container").style.transform =
`translateX(-${index * 100}vw)`;
}

function countSheep(){
sheepCount++;
document.getElementById("sheepVal").innerText = sheepCount;
}
</script>

</body>
</html>
